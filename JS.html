<script>
  /**
   * Módulo Logica de Interfaz V3.3 (FUSIÓN COMPLETA Y OPTIMIZADA)
   * Integración de funciones nativas + Fila Fantasma + Choices.js + Diccionario
   * Textos fijos eliminados y títulos mapeados a CEREBRO/Diccionario.
   */

  // ==========================================
  // VARIABLES DE ESTADO GLOBALES
  // ==========================================
  let historialActual = [];
  let versionGlobalApp = "15";
  let catalogo = [], casoParaConfirmar = null, casoActual = null, casosCargados = [];
  let configYaCargada = false; 

  // Paginación Explorador
  let datosExploradorMemoria = [];
  let paginaActualExplorador = 1;
  const REGISTROS_POR_PAGINA = 100;

  // Selectores Múltiples (Choices.js)
  let choiceTipoId, choiceTipoCaso, choiceClasif;

  // ==========================================
  // INICIALIZACIÓN DEL SISTEMA
  // ==========================================
  window.onload = function() { 
    cargarInfoUsuario(); 
    cargarCatalogo(); 
    cargarVersion(); 
    validarPermisos(); 
    cargarCatalogosExplorador();
  };

  function runGAS(f, s, ...a) {
    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler(s).withFailureHandler(e => {
        document.getElementById('loading').style.display = 'none';
        showToast("<?= CEREBRO.msgErrorServidor || 'Error: ' ?>" + e.message, "error");
      })[f](...a);
    }
  }

  // ==========================================
  // CARGA DE DATOS ESTÁTICOS
  // ==========================================
  function cargarVersion() {
    runGAS('obtenerVersionFormateada', v => {
      const el = document.getElementById('txtVersionApp');
      if (el) el.innerHTML = `<span class="texto-version-largo"><?= CEREBRO.lblVersionPrefix || 'Sentinel Gestor Fraudes RI-FI ' ?></span>${v}`;
    });
  }

  function cargarInfoUsuario() {
    runGAS('obtenerInfoUsuario', info => {
      document.getElementById('userName').textContent = info.nombreCompleto || '<?= CEREBRO.lblEspecialista || "Especialista" ?>';
      document.getElementById('userIdUsr').textContent = info.vpl_usr || '---';
      document.getElementById('userNoEmp').textContent = info.noEmpleado || 'S/N';
    });
  }

  function validarPermisos() {
    runGAS('verificarSiEsAdmin', isAdmin => {
      if (isAdmin) {
        const btnMenu = document.getElementById('menuConfig');
        if (btnMenu) btnMenu.style.display = 'flex';
        const cardHome = document.getElementById('cardConfigHome');
        if (cardHome) cardHome.style.display = 'block';
      }
    });
  }

  // ==========================================
  // ESTADÍSTICAS (SOPORTE CHIPS V1 Y V2)
  // ==========================================
  function actualizarStats() {
    runGAS('obtenerEstadisticasHoy', stats => {
      // Mapeo seguro: actualiza el ID solo si existe en el HTML
      const domMap = {
        'stAtendidosBot': stats.atendidosBot, 'stPromBot': stats.promedioBot, 'stUltimoBot': stats.ultimoBot,
        'stFoliosHoy': stats.foliosHoy, 'stAtendidosHoy': stats.atendidosHoy, 'stPendientes': stats.pendientesHoy,
        'stEnGestion': stats.enGestionHoy, 'stPromHumano': stats.promedioAtencion, 'stPromTotal': stats.promedioTotal,
        'stMaxTotal': stats.maxAtencion, 'stUltimo': stats.ultimoCaso, 'stViejoPendiente': stats.viejoPendiente,
        'stSLA': stats.cumplimientoSLA, 'stMiAtendidosVal': stats.miAtendidos, 'stMiPromedioVal': stats.miPromedio,
        'stMiMax': stats.miMax, 'stMiMin': stats.miMin, 'stMiSLA': stats.miSLA, 'stMiPrimeraAtn': stats.miPrimerAtn,
        'stMiUltimaAtn': stats.miUltimoAtn, 
        
        // Soporte a los Nuevos Chips V2 (Si decides usarlos)
        'stPromEspera': stats.promedioEspera, 'stMaxEspera': stats.maxEspera, 'stPromGestion': stats.promedioGestion,
        'stMaxGestion': stats.maxGestion, 'stMinGestion': stats.minGestion, 'stLimbo': stats.limboDetectado
      };

      for (let id in domMap) {
        const el = document.getElementById(id);
        if(el) el.textContent = domMap[id] !== undefined ? domMap[id] : '---';
      }

      const ahora = new Date();
      const lastSync = document.getElementById('stLastSync');
      if(lastSync) lastSync.textContent = ahora.getHours() + ":" + (ahora.getMinutes() < 10 ? '0' : '') + ahora.getMinutes();
    });
  }

  // ==========================================
  // COMPORTAMIENTO UI (MENÚS Y COLAPSABLES)
  // ==========================================
  function toggleSection(id) {
    const el = document.getElementById(id);
    const icon = el.querySelector('.toggle-icon');
    el.classList.toggle('collapsed');
    if (icon) icon.textContent = el.classList.contains('collapsed') ? '>' : '<';
  }

  function toggleAtencionInfo() {
    const container = document.getElementById('infoGeneralContainer');
    const btn = container.querySelector('.toggle-info-btn');
    container.classList.toggle('collapsed');
    btn.textContent = container.classList.contains('collapsed') ? "<?= CEREBRO.lblVerDetalles || 'VER DETALLES' ?> ▼" : "<?= CEREBRO.lblOcultarDetalles || 'OCULTAR DETALLES' ?> ▲";
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    if(sidebar) sidebar.classList.toggle('active');
  }

  function showToast(m, t) {
    const s = document.getElementById('toast');
    s.textContent = m; s.className = 'toast ' + t; s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 5000);
  }

  function switchTab(b, i) {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); document.getElementById(i).classList.add('active');
  }

  function mostrarError(mensaje) { 
    document.getElementById('mensajeError').textContent = mensaje; 
    document.getElementById('modalError').style.display = 'flex'; 
  }
  
  function cerrarError() { document.getElementById('modalError').style.display = 'none'; }
  function cerrarModalNote() { document.getElementById('modalNote').style.display = 'none'; }

  // ==========================================
  // MESA DE TRABAJO (PENDIENTES Y DICCIONARIO)
  // ==========================================
  function cargarCasos() {
    document.getElementById('loadingText').textContent = "<?= CEREBRO.msgBuscandoCasos || 'Buscando casos...' ?>";
    document.getElementById('loading').style.display = 'flex';
    actualizarStats();
    runGAS('obtenerCasosDinamicos', res => { 
      casosCargados = res; 
      renderTabla(res); 
      document.getElementById('loading').style.display = 'none'; 
    });
  }

  function renderTabla(c) {
    const t = document.getElementById('tablaContenedor');
    if (!c || c.length === 0) { 
      const msgVacio = `<?= CEREBRO.msgNoFolios || 'No hay folios pendientes por atender.' ?>`;
      t.innerHTML = `<div style="text-align:center;padding:40px;color:#999;font-size:16px;font-weight:600;">${msgVacio}</div>`; 
      return; 
    }

    const diccStr = `<?!= CEREBRO.diccionario ? CEREBRO.diccionario : '[]' ?>`;
    let diccionario = [];
    try { diccionario = JSON.parse(diccStr); } catch(e) {}
    
    let h = '<table><thead><tr>';
    
    diccionario.forEach(col => {
      if(col.visual !== "Oculto") {
        h += `<th>${col.visual || col.bd}</th>`;
      }
    });
    h += `<th class="col-accion"><?= CEREBRO.lblAccion || 'Acción' ?></th></tr></thead><tbody>`;
    
    c.forEach((x, index) => {
      const trClass = x.esLimbo ? ' class="row-limbo"' : '';
      h += `<tr id="fila-caso-${x.numeroFila}"${trClass}>`;
      
      diccionario.forEach(col => {
        if(col.visual !== "Oculto") {
          let val = x.datos[col.bd] || '-';
          if (x.esLimbo && col.bd === 'FOLIO') {
            val += `<span class="badge-limbo">RES- ${x.usuarioOriginal}</span>`;
          }
          h += `<td>${val}</td>`;
        }
      });
      
      const btnLabel = x.esLimbo ? "<?= CEREBRO.lblRescatar || 'Rescatar' ?>" : "<?= CEREBRO.lblAtender || 'Atender' ?>";
      h += `<td class="col-accion"><button class="btn" style="padding: 7px 14px; font-size:13px;" onclick="previaConfirmacion(${index})">${btnLabel}</button></td></tr>`;
    });
    t.innerHTML = h + '</tbody></table>';
  }

  function previaConfirmacion(index) {
    casoParaConfirmar = casosCargados[index];
    document.getElementById('modalConfirmToma').style.display = 'flex';
  }

  function cerrarConfirmToma() { document.getElementById('modalConfirmToma').style.display = 'none'; }

  function ejecutarTomaDeCaso() {
    const c = casoParaConfirmar; 
    cerrarConfirmToma();
    document.getElementById('loadingText').textContent = "<?= CEREBRO.msgBloqueandoFolio || 'Bloqueando folio...' ?>";
    document.getElementById('loading').style.display = 'flex';

    runGAS('tomarCasoDinamico', res => {
      if (res.exito) {
        casoActual = c; 
        mostrarPantallaAtencion();
        actualizarStats(); 
        runGAS('obtenerHistorialCaso', h => {
          renderHistorial(h);
        }, c.datos.CURP, c.datos.Cuenta);
      } else { 
        // ✨ FILA FANTASMA (ELIMINACIÓN SIN RECARGAR) ✨
        document.getElementById('loading').style.display = 'none'; 
        showToast(res.mensaje, "error"); // Usamos directo el mensaje oficial del servidor MSG_COLISION
        
        const filaPerdida = document.getElementById("fila-caso-" + c.numeroFila);
        if (filaPerdida) {
          filaPerdida.classList.add('fila-fantasma-out');
          setTimeout(() => filaPerdida.remove(), 400);
        } else {
          cargarCasos();
        }
      }
    }, c.numeroFila, c.esLimbo); 
  }

  // ==========================================
  // PANTALLA DE ATENCIÓN (FORMULARIO Y TABS)
  // ==========================================
  function mostrarPantallaAtencion() {
    const loading = document.getElementById('loading');
    const viewL = document.getElementById('viewLista');
    const viewA = document.getElementById('viewAtencion');
    const tituloGlobal = document.getElementById('mainTitle'); 
    
    if(loading) loading.style.display = 'none';
    if(viewL) viewL.classList.remove('active');
    if(viewA) viewA.className = 'view active';
    
    if(tituloGlobal && casoActual) {
      tituloGlobal.innerHTML = `<?= CEREBRO.lblAtencionFolio || 'Atención Folio:' ?> <span style="color: var(--primary);">${casoActual.datos.FOLIO || 'S/N'}</span>`;
    }
    
    const infoContainer = document.getElementById('infoGeneral');
    if(!infoContainer) return;
    infoContainer.innerHTML = '';

    const tablaHist = document.getElementById('tablaHistorial');
    if(tablaHist) tablaHist.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:30px; color:#999; font-style:italic;"><?= CEREBRO.msgBuscandoAntecedentes || '⏳ Buscando antecedentes del cliente...' ?></td></tr>`;
    
    const diccStr = `<?!= CEREBRO.diccionario ? CEREBRO.diccionario : '[]' ?>`;
    let diccionario = [];
    try { diccionario = JSON.parse(diccStr); } catch(e) {}

    let rowHtml = '<div class="data-row">';
    diccionario.forEach(col => {
      let val = casoActual.datos[col.bd];
      if (val === undefined || val === null || String(val).trim() === '') val = '-';
      
      let cssClass = 'data-item';
      if (col.tipo === 'Texto Largo' || col.tipo === 'Etiqueta') cssClass += ' no-truncate';
      
      let onclickAttr = '';
      if (col.bd === "Comentarios Bot") {
        cssClass += ' clickable-data';
        onclickAttr = `onclick="mostrarModalDetalleBot()"`;
      }
      
      rowHtml += `<div class="${cssClass}" ${onclickAttr}><span class="data-label">${col.visual || col.bd}</span> ${val}</div>`;
    });
    rowHtml += '</div>';
    infoContainer.innerHTML = rowHtml;
    
    const selC = document.getElementById('selectClasificacion');
    const txtI = document.getElementById('textIndicaciones');
    if(selC) selC.value = ""; 
    if(txtI) txtI.value = "";
    
    if(casoActual.datos.Clasificación && selC) selC.value = casoActual.datos.Clasificación;
    if(casoActual.datos.Indicaciones && txtI) txtI.value = casoActual.datos.Indicaciones;

    const btnHist = document.getElementById('btnTabHistorico');
    if(btnHist) switchTab(btnHist, 'tabHistorico');
  }

  function cargarCatalogo() {
    runGAS('obtenerCatalogoNotas', r => {
      const s = document.getElementById('selectClasificacion');
      if(!s) return;
      r.forEach(x => { const o = document.createElement('option'); o.value = x.clasificacion; o.textContent = x.clasificacion; s.appendChild(o); });
      catalogo = r;
    });
  }

  function cambioClasificacion() {
    const v = document.getElementById('selectClasificacion').value;
    const x = catalogo.find(i => i.clasificacion === v);
    document.getElementById('textIndicaciones').value = x ? x.indicacion : "";
  }

  function abrirConfirmacionFinal() {
    if (!document.getElementById('selectClasificacion').value) { 
      const msg = `<?= CEREBRO.msgClasifRequerida || '⚠️ Debes seleccionar una clasificación.' ?>`;
      showToast(msg, "error"); 
      return; 
    }
    document.getElementById('modalConfirmFinal').style.display = 'flex';
  }

  function cerrarConfirmFinal() { document.getElementById('modalConfirmFinal').style.display = 'none'; }

  function enviarFinalizacion() {
    cerrarConfirmFinal(); 
    
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const s = document.getElementById('selectClasificacion');
    const t = document.getElementById('textIndicaciones');
    const tituloGlobal = document.getElementById('mainTitle');
    
    if (!casoActual || !s || !t) return;

    if(loading) loading.style.display = 'flex';
    if(loadingText) loadingText.textContent = "<?= CEREBRO.msgGuardandoAtencion || 'Guardando atención oficial...' ?>";
    
    runGAS('finalizarCasoDinamico', r => {
      if(loading) loading.style.display = 'none';
      
      if (r && r.exito) { 
        casoActual = null;
        const msg = `<?= CEREBRO.msgExitoGestion || '✅ Folio gestionado correctamente.' ?>`;
        showToast(msg, "success"); 
        
        const vA = document.getElementById('viewAtencion');
        const vL = document.getElementById('viewLista');
        if(vA) vA.classList.remove('active'); 
        if(vL) vL.classList.add('active'); 
        
        if(tituloGlobal) tituloGlobal.innerHTML = `<?= CEREBRO.mod1Title || 'Atención Folios' ?> <span id="displayFolio" style="display:none;"></span>`;
        
        cargarCasos(); 
      } else {
        mostrarError(r ? r.mensaje : "<?= CEREBRO.msgErrorDesconocido || 'Error desconocido' ?>");
      }
    }, casoActual.numeroFila, s.value, t.value);
  }

  function cancelarAtencion() {
    const loadingText = document.getElementById('loadingText');
    const loading = document.getElementById('loading');
    const viewA = document.getElementById('viewAtencion');
    const viewL = document.getElementById('viewLista');
    const tituloGlobal = document.getElementById('mainTitle');
    
    if(!casoActual) return;

    if(loadingText) loadingText.textContent = "<?= CEREBRO.msgDesbloqueandoFolio || 'Desbloqueando folio...' ?>";
    if(loading) loading.style.display = 'flex';
    
    runGAS('liberarCasoDinamico', () => {
        casoActual = null;
        if(loading) loading.style.display = 'none';
        if(viewA) viewA.classList.remove('active');
        if(viewL) viewL.classList.add('active'); 
        
        if(tituloGlobal) tituloGlobal.innerHTML = `<?= CEREBRO.mod1Title || 'Atención Folios' ?> <span id="displayFolio" style="display:none;"></span>`;
        
        cargarCasos();
    }, casoActual.numeroFila);
  }

  // ==========================================
  // HISTORIAL Y DETALLES
  // ==========================================
  function renderHistorial(h) {
    const b = document.getElementById('tablaHistorial');
    if (!b) return;

    if (!h || h.length === 0) { 
        b.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:#999;"><?= CEREBRO.msgSinHistorial || 'Sin historial previo para este cliente.' ?></td></tr>`; 
        return; 
    }
    
    const parseDate = (str) => {
      if (!str) return new Date(0);
      const [dPart, hPart] = str.split(' ');
      if (!dPart) return new Date(0);
      const parts = dPart.split('/');
      if (parts.length < 3) return new Date(0);
      const d = parseInt(parts[0], 10), m = parseInt(parts[1], 10), y = parseInt(parts[2], 10);
      let hh = 0, mm = 0, ss = 0;
      if (hPart) {
          const hParts = hPart.split(':');
          hh = parseInt(hParts[0], 10) || 0;
          mm = parseInt(hParts[1], 10) || 0;
          ss = parseInt(hParts[2], 10) || 0;
      }
      return new Date(y, m - 1, d, hh, mm, ss);
    };
    
    h.sort((a, b) => { return parseDate(a.fecha) - parseDate(b.fecha); });
    historialActual = h;

    let r = '';
    h.forEach((x, idx) => {
      r += `<tr style="border-bottom:1px solid #f1f3f5;">
              <td class="hist-fecha">${x.fecha || '-'}</td>
              <td class="hist-folio">${x.folio || '-'}</td>
              <td class="hist-curp">${x.curp || '-'}</td>
              <td class="hist-cuenta">${x.cuenta || '-'}</td>
              <td class="hist-atencion">${x.atencion || '-'}</td>
              <td class="hist-usr">${x.usr || '-'}</td>
              <td class="hist-clasif"><b style="color:var(--primary)">${x.clasificacion || '-'}</b></td>
              <td class="hist-notas clickable-data" onclick="mostrarModalDetalleHist(${idx})" title="<?= CEREBRO.lblVerCompleto || 'Clic para ver completo' ?>">${x.indicaciones || '-'}</td>
            </tr>`;
    });
    b.innerHTML = r;
  }

  function mostrarModalDetalleHist(idx) {
    const data = historialActual[idx];
    document.getElementById('modalNoteTitle').textContent = "<?= CEREBRO.lblNotasGestion || 'Notas de Gestión' ?>";
    document.getElementById('fullNoteText').textContent = data.indicaciones;
    document.getElementById('modalNote').style.display = 'flex';
  }

  function mostrarModalDetalleBot() {
    document.getElementById('modalNoteTitle').textContent = "<?= CEREBRO.lblComentariosBot || 'Comentarios del Bot' ?>";
    document.getElementById('fullNoteText').textContent = casoActual.datos["Comentarios Bot"] || casoActual.datos["NOTAS_INTERNAS"] || "<?= CEREBRO.msgSinComentarios || 'Sin comentarios.' ?>";
    document.getElementById('modalNote').style.display = 'flex';
  }

  // ==========================================
  // NAVEGACIÓN PRINCIPAL
  // ==========================================
  function navegar(pantalla) {
    if (casoActual !== null) {
      const msg = `<?= CEREBRO.msgAvisoSalida || '⚠️ Tienes un folio en atención. Finalízalo o pulsa Cancelar Atención antes de salir.' ?>`;
      showToast(msg, "error");
      return; 
    }
  
    const sidebar = document.getElementById('sidebar');
    if (sidebar && sidebar.classList.contains('active')) {
      sidebar.classList.remove('active');
    }

    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    
    const tituloGlobal = document.getElementById('mainTitle');
    const appTitle = `<?= CEREBRO.appTitle || 'Hub Sentinel' ?>`;
    
    if (pantalla === 'home') {
      const menuHome = document.getElementById('menuHome');
      if (menuHome) menuHome.classList.add('active');
      document.getElementById('viewHome').classList.add('active');
      if(tituloGlobal) tituloGlobal.innerText = `<?= CEREBRO.lblBienvenido || 'Bienvenido - ' ?>${appTitle}`; 
    } 
    else if (pantalla === 'atencion') {
      document.getElementById('menuAtencion').classList.add('active'); 
      document.getElementById('viewLista').classList.add('active'); 
      if(tituloGlobal) tituloGlobal.innerText = `<?= CEREBRO.mod1Title || 'Atención Folios' ?>`; 
      cargarCasos(); 
    } 
    else if (pantalla === 'explorador') {
      document.getElementById('menuExplorador').classList.add('active'); 
      document.getElementById('viewExplorador').classList.add('active'); 
      if(tituloGlobal) tituloGlobal.innerHTML = `<?= CEREBRO.mod2Title || 'Buscador de Folios' ?> <span id="displayFolio" style="display:none;"></span>`; 
    }
    else if (pantalla === 'config') {
      document.getElementById('menuConfig').classList.add('active'); 
      document.getElementById('viewConfig').classList.add('active'); 
      if(tituloGlobal) tituloGlobal.innerText = "<?= CEREBRO.lblMesaControl || 'Mesa de Control' ?>"; 
      
      if (!configYaCargada) cargarConfiguracion(); 
    }
  }

  // ==========================================
  // EXPLORADOR Y SELECTORES MÚLTIPLES (CHOICES.JS)
  // ==========================================
  function toggleFiltrosExplorador() {
    const container = document.getElementById('filterContainer');
    const btn = document.getElementById('btnToggleFiltros');
    if (!container || !btn) return;
    container.classList.toggle('collapsed');
    btn.textContent = container.classList.contains('collapsed') ? "<?= CEREBRO.lblMostrar || 'MOSTRAR' ?> ▼" : "<?= CEREBRO.lblOcultar || 'OCULTAR' ?> ▲";
  }

  function limpiarFiltrosExplorador() {
    const inputs = document.querySelectorAll('#filterContainer .filter-input:not(select)');
    inputs.forEach(input => input.value = "");
    
    // Limpiar Choices.js
    if(choiceTipoId) choiceTipoId.removeActiveItems();
    if(choiceTipoCaso) choiceTipoCaso.removeActiveItems();
    if(choiceClasif) choiceClasif.removeActiveItems();
  }

  function cargarCatalogosExplorador() {
    runGAS('obtenerCatalogosExplorador', function(res) {
      if (res && res.exito) {
        inicializarChoices(res);
      }
    });
  }

  function inicializarChoices(res) {
    const cfg = { 
      removeItemButton: true, 
      searchPlaceholderValue: "<?= CEREBRO.lblBuscarP || 'Buscar...' ?>", 
      itemSelectText: "",
      noResultsText: "<?= CEREBRO.msgSinCoincidencias || 'Sin coincidencias' ?>",
      noChoicesText: "<?= CEREBRO.msgSinOpciones || 'Sin opciones' ?>"
    };
    const fill = (id, list) => {
      const el = document.getElementById(id);
      if(el) el.innerHTML = list.map(t => `<option value="${t}">${t}</option>`).join('');
    };
    
    if(res.tipoId) fill('filtroTipoId', res.tipoId);
    if(res.tipoCaso) fill('filtroTipoCaso', res.tipoCaso);
    if(res.clasificacion) fill('filtroClasificacion', res.clasificacion);
    
    const fId = document.getElementById('filtroTipoId');
    const fCaso = document.getElementById('filtroTipoCaso');
    const fClas = document.getElementById('filtroClasificacion');
    
    if(fId) choiceTipoId = new Choices(fId, cfg);
    if(fCaso) choiceTipoCaso = new Choices(fCaso, cfg);
    if(fClas) choiceClasif = new Choices(fClas, cfg);
  }

  function buscarEnExplorador() {
    const fInicio = document.getElementById('filtroFechaInicio') ? document.getElementById('filtroFechaInicio').value : "";
    const fFin = document.getElementById('filtroFechaFin') ? document.getElementById('filtroFechaFin').value : "";
    const rCond = document.getElementById('filtroResCondicion') ? document.getElementById('filtroResCondicion').value : "";
    const rMin = document.getElementById('filtroResMinutos') ? document.getElementById('filtroResMinutos').value : "";
    
    const kw = document.getElementById('filtroKw') ? document.getElementById('filtroKw').value.trim() : ""; 
    const folio = document.getElementById('filtroFolio') ? document.getElementById('filtroFolio').value.trim() : "";
    const curp = document.getElementById('filtroCurp') ? document.getElementById('filtroCurp').value.trim() : "";
    const cuenta = document.getElementById('filtroCuenta') ? document.getElementById('filtroCuenta').value.trim() : "";
    
    const tId = choiceTipoId ? choiceTipoId.getValue(true) : [];
    const tCaso = choiceTipoCaso ? choiceTipoCaso.getValue(true) : [];
    const clasif = choiceClasif ? choiceClasif.getValue(true) : [];

    if (!kw && !fInicio && !fFin && !folio && !curp && !cuenta && tId.length === 0 && tCaso.length === 0 && clasif.length === 0) {
      const msgFiltros = `<?= CEREBRO.msgFiltros || '⚠️ Define al menos un filtro de búsqueda.' ?>`;
      showToast(msgFiltros, "error");
      return;
    }

    const filtros = {
      palabraClave: kw, fechaInicio: fInicio, fechaFin: fFin, resCondicion: rCond, resMinutos: rMin,
      folio: folio, curp: curp, cuenta: cuenta, tipoId: tId, tipoCaso: tCaso, clasificacion: clasif
    };

    const container = document.getElementById('filterContainer');
    const btn = document.getElementById('btnToggleFiltros');
    if (container && btn) {
      container.classList.add('collapsed');
      btn.textContent = "<?= CEREBRO.lblMostrar || 'MOSTRAR' ?> ▼";
    }

    const contenedor = document.getElementById('tablaExploradorContenedor');
    contenedor.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#999;"><span style="font-size:30px; display:block; margin-bottom:10px;">⏳</span><?= CEREBRO.msgBuscandoBD || 'Buscando en la base de datos...' ?></div>`;

    runGAS('buscarFoliosExplorador', function(res) {
      if (res && res.exito) {
        if (res.data.length === 0) {
          const msgNoRes = `<?= CEREBRO.msgNoResultados || 'No se encontraron folios que coincidan con tus filtros.' ?>`;
          contenedor.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#999;">${msgNoRes}</div>`;
        } else {
          renderTablaExplorador(res.data);
        }
      } else {
        contenedor.innerHTML = `<div style="text-align:center; padding:60px 20px; color:red;"><?= CEREBRO.msgErrorServidor || 'Error del servidor: ' ?>${res ? res.mensaje : "<?= CEREBRO.msgDesconocido || 'Desconocido' ?>"}</div>`;
      }
    }, filtros);
  }

  // ==========================================
  // MEGA-TABLA PAGINADA DEL EXPLORADOR
  // ==========================================
  function renderTablaExplorador(datos) {
    datosExploradorMemoria = datos;
    paginaActualExplorador = 1;
    dibujarPaginaExplorador();
  }

  function dibujarPaginaExplorador() {
    const contenedor = document.getElementById('tablaExploradorContenedor');
    if (!datosExploradorMemoria || datosExploradorMemoria.length === 0) return;

    const totalPaginas = Math.ceil(datosExploradorMemoria.length / REGISTROS_POR_PAGINA);
    const inicio = (paginaActualExplorador - 1) * REGISTROS_POR_PAGINA;
    const fin = Math.min(inicio + REGISTROS_POR_PAGINA, datosExploradorMemoria.length);
    const paginaDatos = datosExploradorMemoria.slice(inicio, fin);

    // Leer Diccionario para Nombres Visuales
    const diccStr = `<?!= CEREBRO.diccionario ? CEREBRO.diccionario : '[]' ?>`;
    let diccionario = [];
    try { diccionario = JSON.parse(diccStr); } catch(e) {}
    
    // Función auxiliar para obtener el nombre visual seguro
    const getVisName = (bdKey, defaultName) => {
      const col = diccionario.find(c => c.bd === bdKey);
      return (col && col.visual) ? col.visual : defaultName;
    };

    let html = `
      <div style="flex: 1; overflow: auto; border-bottom: 1px solid #dee2e6;">
        <table style="width: 100%; border-collapse: collapse; min-width: 2600px; font-size: 11.5px; text-align: center; white-space: nowrap;">
          <thead style="position: sticky; top: 0; background: var(--secondary); color: #fff; z-index: 2;">
            <tr>
              <th style="padding: 10px; position: sticky; left: 0; top: 0; background: var(--secondary); z-index: 10; min-width: 130px; text-align: left;">${getVisName('FOLIO', 'Folio')}</th>
              <th style="padding: 10px; position: sticky; left: 130px; top: 0; background: var(--secondary); z-index: 10; min-width: 160px;">${getVisName('CURP', 'CURP')}</th>
              <th style="padding: 10px; position: sticky; left: 290px; top: 0; background: var(--secondary); z-index: 10; min-width: 160px; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">${getVisName('Cuenta', 'Cuenta')}</th>
              <th style="padding: 10px;">${getVisName('Marca temporal', 'Fecha Folio')}</th>
              <th style="padding: 10px;">${getVisName('Tipo Cliente', 'Tipo Cliente')}</th>
              <th style="padding: 10px;">${getVisName('Tipo de Identificación', 'Tipo Identificación')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Tipo Caso', 'Tipo Caso')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Servicio', 'Servicio')}</th>
              <th style="padding: 10px;">${getVisName('Tienda', 'Tienda')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Dirección de correo electrónico', 'Correo Usuario')}</th>
              <th style="padding: 10px;">${getVisName('Repetido', 'Repetido')}</th>
              <th style="padding: 10px;">${getVisName('USR', 'Especialista')}</th>
              <th style="padding: 10px;">${getVisName('InicioAtencion', 'Inicio Atención')}</th>
              <th style="padding: 10px;">${getVisName('Atención', 'Fin Atención')}</th>
              <th style="padding: 10px;">${getVisName('Resolución', 'SLA (HH:MM:SS)')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Comentarios Bot', 'Notas Bot')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Clasificación', 'Clasificación')}</th>
              <th style="padding: 10px; text-align: left;">${getVisName('Indicaciones', 'Indicaciones')}</th>
            </tr>
          </thead>
          <tbody>
    `;

    paginaDatos.forEach((row, idx) => {
      const txtRepetido = (row.repetido && String(row.repetido).trim() !== '' && String(row.repetido).trim() !== '-') ? 'Sí' : 'No';

      let slaFinalMins = parseFloat(row.resolucion) || 0;
      let hSla = Math.floor(slaFinalMins / 60);
      let mSla = Math.floor(slaFinalMins % 60);
      let sSla = Math.round((slaFinalMins * 60) % 60);
      
      if (sSla === 60) { sSla = 0; mSla++; }
      if (mSla === 60) { mSla = 0; hSla++; }

      let slaFormateado = String(hSla).padStart(2, '0') + ':' + String(mSla).padStart(2, '0') + ':' + String(sSla).padStart(2, '0');
      let idxGlobal = inicio + idx;

      html += `
        <tr style="border-bottom: 1px solid #eee; background: #fff;">
          <td style="padding: 10px; position: sticky; left: 0; background: #fff; z-index: 1; border-right: 1px solid #ddd; font-weight: 700; color: var(--primary); cursor:pointer; min-width: 130px; text-align: left;" onclick="mostrarDetalleExplorador('Folio', ${idxGlobal})">${row.folio}</td>
          <td style="padding: 10px; position: sticky; left: 130px; background: #fff; z-index: 1; border-right: 1px solid #ddd; min-width: 160px;">${row.curp}</td>
          <td style="padding: 10px; position: sticky; left: 290px; background: #fff; z-index: 1; border-right: 2px solid #ddd; min-width: 160px;">${row.cuenta}</td>
          <td style="padding: 10px;">${row.marca}</td>
          <td style="padding: 10px;">${row.tipoCli}</td>
          <td style="padding: 10px;">${row.tipoId}</td>
          <td style="padding: 10px; text-align: left;">${row.tipoCaso}</td>
          <td style="padding: 10px; text-align: left;">${row.servicio}</td>
          <td style="padding: 10px;">${row.tienda}</td>
          <td style="padding: 10px; text-align: left;">${row.correo}</td>
          <td style="padding: 10px; font-weight: bold; color: ${txtRepetido === 'Sí' ? '#d93025' : 'inherit'};">${txtRepetido}</td>
          <td style="padding: 10px;">${row.usr}</td>
          <td style="padding: 10px;">${row.inicioAtn}</td>
          <td style="padding: 10px;">${row.atencion}</td>
          <td style="padding: 10px; font-weight: bold; color: ${slaFinalMins > 30 ? 'red' : 'inherit'};">${slaFormateado}</td>
          <td class="clickable-data" style="padding: 10px; text-align: left; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" onclick="mostrarDetalleExplorador('Notas Bot', ${idxGlobal})" title="<?= CEREBRO.lblVerCompleto || 'Clic para ver completo' ?>">${row.comentarios || '-'}</td>
          <td style="padding: 10px; font-weight: bold; text-align: left;">${row.clasificacion}</td>
          <td class="clickable-data" style="padding: 10px; text-align: left; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" onclick="mostrarDetalleExplorador('Indicaciones', ${idxGlobal})" title="<?= CEREBRO.lblVerCompleto || 'Clic para ver completo' ?>">${row.indicaciones || '-'}</td>
        </tr>
      `;
    });

    html += `</tbody></table></div>`;
    html += `
      <div style="flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f9fa;">
        <div style="font-size: 13px; color: #555;">
          <?= CEREBRO.lblMostrando || 'Mostrando' ?> <b>${inicio + 1}</b> <?= CEREBRO.lblAl || 'al' ?> <b>${fin}</b> <?= CEREBRO.lblDe || 'de' ?> <b style="color: var(--primary); font-size: 14px;">${datosExploradorMemoria.length}</b> <?= CEREBRO.lblFolios || 'folios.' ?>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
          <button class="btn btn-secondary" style="padding: 6px 15px; margin: 0; ${paginaActualExplorador === 1 ? 'opacity: 0.5; cursor: not-allowed;' : ''}" onclick="cambiarPaginaExplorador(-1)" ${paginaActualExplorador === 1 ? 'disabled' : ''}><?= CEREBRO.lblAnterior || '⬅️ Anterior' ?></button>
          <span style="font-weight: 700; color: var(--secondary); font-size: 13px;"><?= CEREBRO.lblPagina || 'Página' ?> ${paginaActualExplorador} <?= CEREBRO.lblDe || 'de' ?> ${totalPaginas}</span>
          <button class="btn btn-secondary" style="padding: 6px 15px; margin: 0; ${paginaActualExplorador === totalPaginas ? 'opacity: 0.5; cursor: not-allowed;' : ''}" onclick="cambiarPaginaExplorador(1)" ${paginaActualExplorador === totalPaginas ? 'disabled' : ''}><?= CEREBRO.lblSiguiente || 'Siguiente ➡️' ?></button>
        </div>
      </div>
    `;

    contenedor.innerHTML = html;
  }

  function cambiarPaginaExplorador(direccion) {
    paginaActualExplorador += direccion;
    dibujarPaginaExplorador();
  }

  function mostrarDetalleExplorador(tipo, idxGlobal) {
    const row = datosExploradorMemoria[idxGlobal];
    if (!row) return;

    if (tipo === 'Folio') {
      document.getElementById('modalNoteTitle').textContent = "<?= CEREBRO.lblDetallesFolio || 'Detalles del Folio' ?>";
      document.getElementById('fullNoteText').textContent = row.folio;
    } else if (tipo === 'Notas Bot') {
      document.getElementById('modalNoteTitle').textContent = "<?= CEREBRO.lblComentariosBot || 'Comentarios del Bot' ?>";
      document.getElementById('fullNoteText').textContent = row.comentarios || "<?= CEREBRO.msgSinComentarios || 'Sin comentarios.' ?>";
    } else if (tipo === 'Indicaciones') {
      document.getElementById('modalNoteTitle').textContent = "<?= CEREBRO.lblIndicacionesAsesor || 'Indicaciones del Asesor' ?>";
      document.getElementById('fullNoteText').textContent = row.indicaciones || "<?= CEREBRO.msgSinIndicaciones || 'Sin indicaciones.' ?>";
    }
    
    document.getElementById('modalNote').style.display = 'flex';
  }

  // ==========================================
  // PREVENCIÓN DE CIERRE Y SIDEBAR
  // ==========================================
  window.addEventListener('beforeunload', function (e) {
    if (casoActual !== null) {
      if (typeof google !== 'undefined') google.script.run.liberarCasoDinamico(casoActual.numeroFila);
      e.preventDefault();
      e.returnValue = "<?= CEREBRO.msgAvisoSalida || 'Tienes un caso en atención. Si sales, el folio podría quedar bloqueado.' ?>";
    }
  });

  document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    if(!sidebar) return;
    const clickAdentro = sidebar.contains(event.target);
    const clickEnBoton = event.target.closest('.hamburger-btn');
    if (sidebar.classList.contains('active') && !clickAdentro && !clickEnBoton) {
      sidebar.classList.remove('active');
    }
  });

  // ==========================================
  // MESA DE CONTROL (GLOBAL + DICCIONARIO)
  // ==========================================
  function cargarConfiguracion() {
    document.getElementById('loadingText').textContent = "<?= CEREBRO.msgDescifrando || 'Descifrando variables...' ?>";
    document.getElementById('loading').style.display = 'flex';

    runGAS('leerConfiguracionGeneral', cfg => {
      document.getElementById('cfg_filas').value          = cfg.filas;
      document.getElementById('cfg_limbo').value          = cfg.limbo;
      document.getElementById('cfg_sla').value            = cfg.sla;
      document.getElementById('cfg_sheetId').value        = cfg.sheetId;
      document.getElementById('cfg_sheetName').value      = cfg.sheetName;
      document.getElementById('cfg_catalogName').value    = cfg.catalogName;
      document.getElementById('cfg_backupFolderId').value = cfg.backupFolderId || "";
      document.getElementById('cfg_admins').value         = cfg.admins;
      document.getElementById('cfg_soporte').value        = cfg.soporte;
      document.getElementById('cfg_appTitle').value       = cfg.appTitle;
      document.getElementById('cfg_appVersion').value     = cfg.appVersion;
      document.getElementById('cfg_mod1Title').value      = cfg.mod1Title;
      document.getElementById('cfg_mod1Desc').value       = cfg.mod1Desc;
      document.getElementById('cfg_mod2Title').value      = cfg.mod2Title;
      document.getElementById('cfg_mod2Desc').value       = cfg.mod2Desc;
      
      ['cfg_sheetId', 'cfg_backupFolderId'].forEach(id => {
        const input = document.getElementById(id);
        const iconHide = document.getElementById('icon_hide_' + id);
        const iconShow = document.getElementById('icon_show_' + id);
        if(input) input.type = 'password';
        const groupReal = document.getElementById(id === 'cfg_sheetId' ? 'group_sheetId' : 'group_backupFolderId');
        if(groupReal) groupReal.classList.remove('security-visible');
        if(iconHide) iconHide.style.display = 'inline-block';
        if(iconShow) iconShow.style.display = 'none';
      });

      let diccionarioData = [];
      try { diccionarioData = JSON.parse(cfg.diccionario); } catch(e) {}
      
      const tbody = document.getElementById('diccionario_body');
      tbody.innerHTML = ''; 
      if(diccionarioData.length === 0) agregarFilaDiccionario();
      else diccionarioData.forEach(col => agregarFilaDiccionario(col));
      
      configYaCargada = true; 
      document.getElementById('loading').style.display = 'none';
    });
  }

  function guardarConfiguracion() {
    const tbody = document.getElementById('diccionario_body');
    const filas = tbody.querySelectorAll('tr');
    let jsonDiccionario = [];

    filas.forEach(tr => {
      const inputs = tr.querySelectorAll('input, select, textarea');
      if(inputs[0] && inputs[0].value.trim() !== '') {
        jsonDiccionario.push({
          bd: inputs[0].value.trim(),
          visual: inputs[1].value.trim(),
          tipo: inputs[2].value,
          desc: inputs[3].value.trim(),  
          filtro: inputs[4].checked,
          editable: inputs[5].checked
        });
      }
    });

    const datosConfig = {
      filas:          document.getElementById('cfg_filas').value,
      limbo:          document.getElementById('cfg_limbo').value,
      sla:            document.getElementById('cfg_sla').value,
      sheetId:        document.getElementById('cfg_sheetId').value,
      sheetName:      document.getElementById('cfg_sheetName').value,
      catalogName:    document.getElementById('cfg_catalogName').value,
      backupFolderId: document.getElementById('cfg_backupFolderId').value, 
      admins:         document.getElementById('cfg_admins').value,
      soporte:        document.getElementById('cfg_soporte').value,
      appTitle:       document.getElementById('cfg_appTitle').value,
      appVersion:     document.getElementById('cfg_appVersion').value,
      mod1Title:      document.getElementById('cfg_mod1Title').value,
      mod1Desc:       document.getElementById('cfg_mod1Desc').value,
      mod2Title:      document.getElementById('cfg_mod2Title').value,
      mod2Desc:       document.getElementById('cfg_mod2Desc').value,
      diccionario:    JSON.stringify(jsonDiccionario)
    };

    document.getElementById('loadingText').textContent = "<?= CEREBRO.msgRespaldando || 'Encriptando y respaldando en Drive...' ?>";
    document.getElementById('loading').style.display = 'flex';

    runGAS('guardarConfiguracionGeneral', res => {
      document.getElementById('loading').style.display = 'none';
      if(res && res.exito) {
        showToast("<?= CEREBRO.msgConfigGuardada || '¡Configuración guardada y respaldada en Drive!' ?>", "success");
      } else {
        mostrarError("<?= CEREBRO.msgErrorGuardar || 'Error al guardar/respaldar: ' ?>" + (res ? res.mensaje : "<?= CEREBRO.msgDesconocido || 'Desconocido' ?>"));
      }
    }, datosConfig);
  }

  function autoResizeTextarea(textarea) {
    textarea.style.height = '33px'; 
    const scrollHeight = textarea.scrollHeight;
    if (scrollHeight > 33) textarea.style.height = scrollHeight + 'px'; 
  }

  function agregarFilaDiccionario(datos = null) {
    const tbody = document.getElementById('diccionario_body');
    const tr = document.createElement('tr');
    
    const dbVal = datos ? datos.bd : '';
    const visVal = datos ? datos.visual : '';
    const tipo = datos ? datos.tipo : 'Texto';
    const descVal = (datos && datos.desc) ? datos.desc : ''; 
    const filChk = (datos && datos.filtro) ? 'checked' : '';
    const edChk = (datos && datos.editable) ? 'checked' : '';

    tr.innerHTML = `
      <td><input type="text" class="schema-input" style="font-weight: bold; color: var(--secondary);" value="${dbVal}" placeholder="Ej. CURP"></td>
      <td><input type="text" class="schema-input" value="${visVal}" placeholder="Ej. CURP Cliente"></td>
      <td>
        <select class="schema-select">
          <option ${tipo === 'Texto' ? 'selected' : ''}>Texto</option>
          <option ${tipo === 'Número' ? 'selected' : ''}>Número</option>
          <option ${tipo === 'Fecha' ? 'selected' : ''}>Fecha</option>
          <option ${tipo === 'Etiqueta' ? 'selected' : ''}>Etiqueta</option>
          <option ${tipo === 'Texto Largo' ? 'selected' : ''}>Texto Largo</option>
        </select>
      </td>
      <td><textarea class="schema-textarea" placeholder="Comentarios..." oninput="autoResizeTextarea(this)">${descVal}</textarea></td>
      <td style="text-align:center;"><label class="checkbox-wrapper"><input type="checkbox" ${filChk}></label></td>
      <td style="text-align:center;"><label class="checkbox-wrapper"><input type="checkbox" ${edChk}></label></td>
      <td style="text-align:center;">
        <button class="btn-del-col" onclick="eliminarFilaDiccionario(this)" title="Borrar Columna">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
    const textareas = tr.querySelectorAll('textarea');
    textareas.forEach(ta => autoResizeTextarea(ta));
  }

  function eliminarFilaDiccionario(btn) {
    btn.closest('tr').remove();
  }

  function toggleVisibility(inputId, groupId) {
    const input = document.getElementById(inputId);
    const group = document.getElementById(groupId);
    const iconHide = document.getElementById('icon_hide_' + inputId); 
    const iconShow = document.getElementById('icon_show_' + inputId); 
    
    if(!input || !group || !iconHide || !iconShow) return;

    if (input.type === 'password') {
      input.type = 'text';
      group.classList.add('security-visible'); 
      iconHide.style.display = 'none';         
      iconShow.style.display = 'inline-block'; 
    } else {
      input.type = 'password';
      group.classList.remove('security-visible');
      iconHide.style.display = 'inline-block'; 
      iconShow.style.display = 'none';         
    }
  }

  function switchConfigTab(paneId, tabElement) {
    document.querySelectorAll('.settings-pane').forEach(pane => pane.classList.remove('active'));
    document.querySelectorAll('.settings-menu-item').forEach(item => item.classList.remove('active'));
    document.getElementById(paneId).classList.add('active');
    tabElement.classList.add('active');
  }

  function cargarRespaldoJSON(event) {
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const cfgRespaldo = JSON.parse(e.target.result);
        document.getElementById('cfg_filas').value          = cfgRespaldo.filas || "";
        document.getElementById('cfg_limbo').value          = cfgRespaldo.limbo || "";
        document.getElementById('cfg_sla').value            = cfgRespaldo.sla || "";
        document.getElementById('cfg_sheetId').value        = cfgRespaldo.sheetId || "";
        document.getElementById('cfg_sheetName').value      = cfgRespaldo.sheetName || "";
        document.getElementById('cfg_catalogName').value    = cfgRespaldo.catalogName || "";
        document.getElementById('cfg_backupFolderId').value = cfgRespaldo.backupFolderId || "";
        document.getElementById('cfg_admins').value         = cfgRespaldo.admins || "";
        document.getElementById('cfg_soporte').value        = cfgRespaldo.soporte || "";
        document.getElementById('cfg_appTitle').value       = cfgRespaldo.appTitle || "";
        document.getElementById('cfg_appVersion').value     = cfgRespaldo.appVersion || "";
        document.getElementById('cfg_mod1Title').value      = cfgRespaldo.mod1Title || "";
        document.getElementById('cfg_mod1Desc').value       = cfgRespaldo.mod1Desc || "";
        document.getElementById('cfg_mod2Title').value      = cfgRespaldo.mod2Title || "";
        document.getElementById('cfg_mod2Desc').value       = cfgRespaldo.mod2Desc || "";
        
        let diccionarioData = [];
        try { diccionarioData = JSON.parse(cfgRespaldo.diccionario); } catch(err) {}
        
        const tbody = document.getElementById('diccionario_body');
        tbody.innerHTML = ''; 
        if(diccionarioData.length === 0) agregarFilaDiccionario();
        else diccionarioData.forEach(col => agregarFilaDiccionario(col));

        showToast("<?= CEREBRO.msgRespaldoCargado || 'Respaldo cargado en pantalla. Da clic en Guardar Configuración para aplicarlo.' ?>", "success");
      } catch(error) {
        showToast("<?= CEREBRO.msgArchivoInvalido || 'Archivo inválido o corrupto.' ?>", "error");
      }
      event.target.value = ''; 
    };
    reader.readAsText(file);
  }

</script>
